<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, 
        initial-scale=1.0, maximum-scale=1.0">
  <title>Your Adidas Moment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0A0A0A;
      color: #FFFFFF;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      width: 80px;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      color: #A0A0A0;
      font-size: 14px;
      margin-bottom: 32px;
      text-align: center;
    }

    .video-container {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 9/16;
      background: #141414;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn-primary {
      width: 100%;
      max-width: 360px;
      padding: 18px;
      background: #FFFFFF;
      color: #0A0A0A;
      border: none;
      font-weight: 900;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 12px;
      display: none;
    }

    .btn-primary:active {
      background: #E0E0E0;
    }

    .btn-secondary {
      width: 100%;
      max-width: 360px;
      padding: 18px;
      background: transparent;
      color: #FFFFFF;
      border: 2px solid #FFFFFF;
      font-weight: 900;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .btn-secondary:active {
      background: rgba(255,255,255,0.1);
    }

    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .expiry-note {
      font-size: 12px;
      color: #666;
      text-align: center;
    }

    .error-state {
      text-align: center;
      color: #A0A0A0;
    }

    .loading {
      text-align: center;
      color: #A0A0A0;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .button-group {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <!-- Replace with real Adidas SVG logo -->
  <svg class="logo" viewBox="0 0 100 100" fill="none"
       xmlns="http://www.w3.org/2000/svg">
    <rect x="18" y="20" width="14" height="60"
          rx="2" fill="white"/>
    <rect x="43" y="20" width="14" height="60"
          rx="2" fill="white"/>
    <rect x="68" y="20" width="14" height="60"
          rx="2" fill="white"/>
  </svg>

  <div id="loading" class="loading">LOADING YOUR VIDEO...</div>

  <div id="content" style="display:none; width:100%;
       max-width:360px; flex-direction:column; align-items:center;">
    <h1>Your Moment</h1>
    <p class="subtitle">FEEL YOUR VIBE</p>

    <div class="video-container">
      <video id="video"
             playsinline
             autoplay
             loop
             muted
             controls>
      </video>
    </div>

    <div class="button-group">
      <!-- Share button — only shown on mobile where Web Share API is available -->
      <button id="share-btn" class="btn-primary" onclick="shareVideo()">
        ↑ SHARE VIDEO
      </button>

      <!-- Download button — always shown -->
      <button id="download-btn" class="btn-secondary" onclick="downloadVideo()">
        ↓ DOWNLOAD
      </button>
    </div>

    <p class="expiry-note">Video available for 7 days</p>
  </div>

  <div id="error" class="error-state"
       style="display:none;">
    <p>Video not found or has expired.</p>
    <p style="margin-top:8px; font-size:12px;
       color:#666;">Videos are available for 7 days
       after your session.</p>
  </div>

  <script>
    // Extract session ID from URL path: /v/{sessionId}
    const path = window.location.pathname;
    const parts = path.split('/');
    const sessionId = parts[parts.length - 1];

    // R2 public URL
    const R2_PUBLIC_URL = 'https://pub-0db4e1403ed246daab0a17518614e71b.r2.dev';
    const videoUrl = `${R2_PUBLIC_URL}/${sessionId}_encoded.mp4`;

    const loading = document.getElementById('loading');
    const content = document.getElementById('content');
    const error = document.getElementById('error');
    const videoEl = document.getElementById('video');
    const shareBtn = document.getElementById('share-btn');

    // Show share button only on mobile where Web Share API is supported
    if (navigator.share) {
      shareBtn.style.display = 'block';
    }

    async function loadVideo() {
      try {
        const res = await fetch(videoUrl, { method: 'HEAD' });
        if (!res.ok) {
          loading.style.display = 'none';
          error.style.display = 'block';
          return;
        }
        videoEl.src = videoUrl;
        loading.style.display = 'none';
        content.style.display = 'flex';
      } catch (err) {
        loading.style.display = 'none';
        error.style.display = 'block';
      }
    }

    // Web Share API — opens native OS share sheet (Instagram, Facebook, WhatsApp, Save to Camera Roll)
    async function shareVideo() {
      try {
        const response = await fetch(videoUrl);
        const blob = await response.blob();
        const file = new File([blob], 'adidas-moment.mp4', { type: 'video/mp4' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          // Share the actual video file
          await navigator.share({
            files: [file],
            title: 'My Adidas Moment',
          });
        } else {
          // Fallback: share the page URL
          await navigator.share({
            title: 'My Adidas Moment',
            url: window.location.href,
          });
        }
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.log('Share failed:', err);
        }
      }
    }

    // Download — blob approach forces save dialog on iOS and Android
    async function downloadVideo() {
      const btn = document.getElementById('download-btn');
      try {
        btn.textContent = 'DOWNLOADING...';
        btn.disabled = true;

        const response = await fetch(videoUrl);
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = `adidas-moment-${sessionId}.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        btn.textContent = '✓ SAVED';
        setTimeout(() => {
          btn.textContent = '↓ DOWNLOAD';
          btn.disabled = false;
        }, 3000);
      } catch (err) {
        console.error('Download failed:', err);
        // Fallback: open video in new tab
        window.open(videoUrl, '_blank');
        btn.textContent = '↓ DOWNLOAD';
        btn.disabled = false;
      }
    }

    if (sessionId && sessionId.length > 10) {
      loadVideo();
    } else {
      loading.style.display = 'none';
      error.style.display = 'block';
    }
  </script>

</body>
</html>
