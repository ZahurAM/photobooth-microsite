<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, 
        initial-scale=1.0, maximum-scale=1.0">
  <title>Your Adidas Moment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0A0A0A;
      color: #FFFFFF;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      width: 80px;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      color: #A0A0A0;
      font-size: 14px;
      margin-bottom: 32px;
      text-align: center;
    }

    .video-container {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 9/16;
      background: #141414;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .download-btn {
      display: block;
      width: 100%;
      max-width: 360px;
      padding: 18px;
      background: #FFFFFF;
      color: #0A0A0A;
      text-align: center;
      font-weight: 900;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      margin-bottom: 16px;
    }

    .download-btn:active {
      background: #E0E0E0;
    }

    .expiry-note {
      font-size: 12px;
      color: #666;
      text-align: center;
    }

    .error-state {
      text-align: center;
      color: #A0A0A0;
    }

    .loading {
      text-align: center;
      color: #A0A0A0;
      font-size: 14px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <!-- Replace with real Adidas SVG logo -->
  <svg class="logo" viewBox="0 0 100 100" fill="none" 
       xmlns="http://www.w3.org/2000/svg">
    <rect x="18" y="20" width="14" height="60" 
          rx="2" fill="white"/>
    <rect x="43" y="20" width="14" height="60" 
          rx="2" fill="white"/>
    <rect x="68" y="20" width="14" height="60" 
          rx="2" fill="white"/>
  </svg>

  <div id="loading" class="loading">LOADING YOUR VIDEO...</div>
  
  <div id="content" style="display:none; width:100%; 
       max-width:360px; display:none; 
       flex-direction:column; align-items:center;">
    <h1>Your Moment</h1>
    <p class="subtitle">FEEL YOUR VIBE</p>
    
    <div class="video-container">
      <video id="video" 
             playsinline 
             autoplay 
             loop 
             muted 
             controls>
      </video>
    </div>

    <a id="download-btn" class="download-btn" 
       href="#" download>
      ↓ DOWNLOAD YOUR VIDEO
    </a>

    <p class="expiry-note">
      Video available for 7 days
    </p>
  </div>

  <div id="error" class="error-state" 
       style="display:none;">
    <p>Video not found or has expired.</p>
    <p style="margin-top:8px; font-size:12px; 
       color:#666;">Videos are available for 7 days 
       after your session.</p>
  </div>

  <script>
    // Extract session ID from URL path
    // URL pattern: /v/{sessionId}
    const path = window.location.pathname;
    const parts = path.split('/');
    const sessionId = parts[parts.length - 1];

    // R2 public URL — update this after deploying
    const R2_PUBLIC_URL = 'https://pub-0db4e1403ed246daab0a17518614e71b.r2.dev';
    const videoUrl = `${R2_PUBLIC_URL}/${sessionId}_encoded.mp4`;

    const loading = document.getElementById('loading');
    const content = document.getElementById('content');
    const error = document.getElementById('error');
    const video = document.getElementById('video');
    const downloadBtn = document.getElementById('download-btn');

    async function loadVideo() {
      try {
        // Check if video exists
        const res = await fetch(videoUrl, { method: 'HEAD' });
        
        if (!res.ok) {
          loading.style.display = 'none';
          error.style.display = 'block';
          return;
        }

        // Video exists — show it
        video.src = videoUrl;
        downloadBtn.href = videoUrl;
        downloadBtn.setAttribute('download', 
          `adidas-moment-${sessionId}.mp4`);
        
        loading.style.display = 'none';
        content.style.display = 'flex';
        
      } catch (err) {
        loading.style.display = 'none';
        error.style.display = 'block';
      }
    }

    if (sessionId && sessionId.length > 10) {
      loadVideo();
    } else {
      loading.style.display = 'none';
      error.style.display = 'block';
    }
  </script>

</body>
</html>
