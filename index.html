<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0A0A0A">
<title>Adidas Vibes — Your Moment</title>
<style>
  @font-face {
    font-family: 'AdidasFG';
    src: url('/fonts/adidasFG.otf') format('opentype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'AdidasFG';
    src: url('/fonts/adidasFG-Bold.otf') format('opentype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0A0A0A;
    color: #ffffff;
    font-family: 'AdidasFG', Arial, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px 40px;
    overflow-x: hidden;
  }

  .container {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Header */
  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .adidas-mark {
    display: flex;
    gap: 3px;
    align-items: flex-end;
  }
  .adidas-mark div {
    background: #ffffff;
    border-radius: 1px;
  }
  .adidas-mark div:nth-child(1) { width: 8px; height: 14px; }
  .adidas-mark div:nth-child(2) { width: 8px; height: 20px; }
  .adidas-mark div:nth-child(3) { width: 8px; height: 26px; }
  .campaign-label {
    font-size: 11px;
    color: #555;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Vibe badge */
  .vibe-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    margin-bottom: 20px;
  }
  .vibe-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .vibe-name-badge {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ccc;
  }

  /* Heading */
  .heading {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    line-height: 1;
    margin-bottom: 8px;
  }
  .subheading {
    font-size: 14px;
    color: #555;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 32px;
  }

  /* Video container */
  .video-wrap {
    width: 100%;
    max-width: 320px;
    aspect-ratio: 9/16;
    background: #141414;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
    position: relative;
    margin-bottom: 32px;
  }
  .video-wrap video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .video-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #141414;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid #2a2a2a;
    border-top-color: #666;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Buttons */
  .btn-group {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }
  .btn {
    width: 100%;
    height: 56px;
    border-radius: 12px;
    font-family: 'AdidasFG', Arial, sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-primary {
    background: #ffffff;
    color: #000000;
  }
  .btn-secondary {
    background: transparent;
    color: #ffffff;
    border: 1px solid #333;
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-icon {
    font-size: 18px;
  }

  /* Expiry note */
  .expiry {
    font-size: 12px;
    color: #333;
    letter-spacing: 1px;
    text-align: center;
    margin-top: 8px;
  }

  /* Error state */
  .error-state {
    text-align: center;
    padding: 40px 20px;
  }
  .error-state h2 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    color: #fff;
  }
  .error-state p {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
  }

  /* Vibe colour accent line */
  .accent-line {
    width: 40px;
    height: 3px;
    border-radius: 2px;
    margin: 0 auto 24px;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="adidas-mark">
      <div></div><div></div><div></div>
    </div>
    <div class="campaign-label">Feel Your Vibe</div>
  </div>

  <div id="mainContent" style="width:100%;display:flex;flex-direction:column;align-items:center;">

    <div class="spinner" id="loadingSpinner"></div>

  </div>

</div>

<script>
  const VIBES = {
    'ENERGY DRIVE':  { color: '#2B6CC4' },
    'POWER ZONE':    { color: '#E8543A' },
    'SPARK UP':      { color: '#7B4FB5' },
    'CHILL ZONE':    { color: '#F0A820' },
    'GET COMFY':     { color: '#E8478A' },
    'DREAM GLAZE':   { color: '#8B6343' },
    'WONDER FORCE':  { color: '#E63329' },
    'HAPPY FEELS':   { color: '#E8544A' },
  };

  const R2_PUBLIC_URL = 'https://pub-0db4e1403ed246daab0a17518614e71b.r2.dev';
  const MICROSITE_BASE = 'https://photobooth-microsite.pages.dev';

  function getSessionId() {
    const parts = window.location.pathname.split('/');
    return parts[parts.length - 1] || null;
  }

  function getVibeFromSession(sessionId) {
    if (!sessionId) return null;
    const parts = sessionId.split('-');
    if (parts.length > 0) {
      const vibePart = parts.slice(0, -1).join(' ').toUpperCase();
      return VIBES[vibePart] || null;
    }
    return null;
  }

  function getVibeNameFromSession(sessionId) {
    if (!sessionId) return null;
    const parts = sessionId.split('-');
    if (parts.length > 1) {
      return parts.slice(0, -1).map(w =>
        w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()
      ).join(' ').toUpperCase();
    }
    return null;
  }

  async function downloadVideo(url, filename) {
    const btn = document.getElementById('downloadBtn');
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-icon">⏳</span> DOWNLOADING...';
    }
    try {
      const res = await fetch(url);
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename || 'adidas-vibes.mp4';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      if (btn) {
        btn.innerHTML = '<span class="btn-icon">✓</span> SAVED';
        setTimeout(() => {
          btn.disabled = false;
          btn.innerHTML = '<span class="btn-icon">↓</span> DOWNLOAD';
        }, 3000);
      }
    } catch (e) {
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = '<span class="btn-icon">↓</span> DOWNLOAD';
      }
    }
  }

  async function shareVideo(url, vibeName) {
    if (navigator.share) {
      try {
        await navigator.share({
          title: 'Adidas Vibes — ' + (vibeName || 'Feel Your Vibe'),
          text: 'Check out my Adidas Vibes moment! #AdidasVibes #FeelYourVibe',
          url: window.location.href,
        });
      } catch (e) {
        if (e.name !== 'AbortError') {
          await downloadVideo(url, 'adidas-vibes.mp4');
        }
      }
    } else {
      await downloadVideo(url, 'adidas-vibes.mp4');
    }
  }

  function renderError() {
    document.getElementById('mainContent').innerHTML = `
      <div class="error-state">
        <div class="accent-line" style="background:#333;"></div>
        <h2>Video Not Found</h2>
        <p>This video may have expired or the link is incorrect.<br>Videos are available for 7 days after your session.</p>
      </div>
    `;
  }

  function renderVideo(sessionId, videoUrl, vibeName, vibeColor) {
    const content = document.getElementById('mainContent');
    const shareSupported = !!navigator.share;

    content.innerHTML = `
      <div class="vibe-badge" style="border-color:${vibeColor}33;">
        <div class="vibe-dot" style="background:${vibeColor};"></div>
        <span class="vibe-name-badge" style="color:${vibeColor};">${vibeName || 'YOUR VIBE'}</span>
      </div>

      <div class="heading">YOUR<br>MOMENT</div>
      <div class="subheading">Feel Your Vibe</div>

      <div class="accent-line" style="background:${vibeColor};"></div>

      <div class="video-wrap">
        <div class="video-overlay" id="videoOverlay">
          <div class="spinner"></div>
        </div>
        <video
          id="vibeVideo"
          src="${videoUrl}"
          playsinline
          autoplay
          loop
          muted
          controls
        ></video>
      </div>

      <div class="btn-group">
        ${shareSupported ? `
        <button class="btn btn-primary" onclick="shareVideo('${videoUrl}', '${vibeName}')">
          <span class="btn-icon">↑</span> SHARE VIDEO
        </button>
        ` : ''}
        <button class="btn ${shareSupported ? 'btn-secondary' : 'btn-primary'}" id="downloadBtn" onclick="downloadVideo('${videoUrl}', 'adidas-vibes-${sessionId}.mp4')">
          <span class="btn-icon">↓</span> DOWNLOAD
        </button>
      </div>

      <div class="expiry">Available for 7 days · Adidas Vibes S/S 2025</div>
    `;

    const video = document.getElementById('vibeVideo');
    const overlay = document.getElementById('videoOverlay');

    video.addEventListener('canplay', () => {
      overlay.style.display = 'none';
    });
    video.addEventListener('error', () => {
      renderError();
    });
  }

  async function init() {
    const sessionId = getSessionId();

    if (!sessionId || sessionId === 'v') {
      renderError();
      return;
    }

    const videoUrl = `${R2_PUBLIC_URL}/${sessionId}_encoded.mp4`;
    const vibeName = getVibeNameFromSession(sessionId);
    const vibeData = vibeName ? VIBES[vibeName] : null;
    const vibeColor = vibeData ? vibeData.color : '#ffffff';

    // Render immediately — let the video element handle load/error natively
    // Avoids CORS failures from HEAD preflight requests to R2
    renderVideo(sessionId, videoUrl, vibeName, vibeColor);
  }

  init();
</script>
</body>
</html>
